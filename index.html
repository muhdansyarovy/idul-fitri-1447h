<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#E0E5EC"> 
<title>Selamat Hari Raya Idul Fitri 1447 H</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Variabel warna dasar untuk Neumorphism */
  --bg-color: #E0E5EC;
  --shadow-light: #ffffff;
  --shadow-dark: #a3b1c6;
  
  --a1: #C4A96A;
  --a2: #8B9E7C;
  --tm: #5C4A28;
  --ts: #7A8B99; 
  --tl: #A3B1C6;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background: var(--bg-color);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  min-height:100dvh;
  font-family:'Cormorant Garamond',serif;
  padding:0;
  margin:0;
}

/* --- Elemen Neumorphism Utama --- */
.poster {
  width: 100%;
  max-width: 540px;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg-color);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 44px 40px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  
  box-shadow: 
    9px 9px 16px var(--shadow-dark), 
    -9px -9px 16px var(--shadow-light);
  border-radius: 30px; 
}
.poster>*{position:relative;z-index:2}
.poster{padding-top:max(44px,env(safe-area-inset-top,44px));padding-bottom:max(32px,env(safe-area-inset-bottom,32px))}

#BC{position:absolute;inset:0;z-index:0;pointer-events:none;width:100%;height:100%;transition:opacity 0.8s}

.cn{position:absolute;width:20px;height:20px;z-index:3}
.cn::before,.cn::after{content:'';position:absolute;background:var(--a1);opacity:0.3;transition:background .8s}
.c1{top:20px;left:20px}.c1::before{width:20px;height:.5px}.c1::after{width:.5px;height:20px}
.c2{top:20px;right:20px}.c2::before{top:0;right:0;width:20px;height:.5px}.c2::after{top:0;right:0;width:.5px;height:20px}
.c3{bottom:20px;left:20px}.c3::before{bottom:0;left:0;width:20px;height:.5px}.c3::after{bottom:0;left:0;width:.5px;height:20px}
.c4{bottom:20px;right:20px}.c4::before{bottom:0;right:0;width:20px;height:.5px}.c4::after{bottom:0;right:0;width:.5px;height:20px}

/* Container Ka'bah (DIPERBAIKI AGAR SELALU KEPOTONG SAMA SEPERTI DESKTOP) */
.twc{
  width: 185.185%; /* Lebar selalu 185% dari poster agar sisa sisinya terpotong */
  max-width: 1000px;
  aspect-ratio: 1000 / 390; /* Memaksa proporsi tinggi otomatis pas */
  flex-shrink: 0; /* Mencegah gepeng di mobile */
  margin-bottom: 22px;
  position: relative;
  animation: fi 1.5s ease-out both;
  transition: transform 1.2s cubic-bezier(.4,0,.2,1), margin 1.2s;
  border-radius: 50%;
  background: var(--bg-color);
  box-shadow: inset 5px 5px 10px var(--shadow-dark), 
              inset -5px -5px 10px var(--shadow-light);
}
#TC{width:100%;height:100%;display:block; border-radius: 50%;}

.gt{
  font-size:13px;
  font-weight:600;
  letter-spacing:5px;
  text-transform:uppercase;
  color:var(--tm); 
  margin-bottom:10px;
  margin-top:36px;
  animation:fd 1.2s ease-out .3s both;
  transition:color .8s,opacity .6s;
  text-shadow: 1px 1px 0px var(--shadow-light);
}

.kt{
  margin-bottom:8px;
  animation:fd 1.2s ease-out .5s both;
  text-align:center;
  transition:color .8s,opacity .6s;
}
.kt h1 {
  font-family: 'Amiri', serif; 
  font-size: 72px; 
  color: var(--tm); 
  font-weight: 700;
  line-height: 1;
  text-shadow: 1px 1px 0px var(--shadow-light);
}

.hy{font-size:17px;font-weight:600;letter-spacing:8px;color:var(--a1);margin-bottom:20px;animation:fd 1.2s ease-out .7s both;transition:color .8s,opacity .6s; text-shadow: 1px 1px 2px var(--shadow-light);}

.ba{display:flex;align-items:center;gap:14px;margin-bottom:16px;animation:fi 1.6s ease-out .9s both;transition:opacity .6s}
.bll{width:44px;height:1px;background:var(--a2);opacity:.5;transition:background .8s}
.bdd{width:5px;height:5px;background:var(--a2);border-radius:50%;opacity:.7;transition:background .8s}

.at{
  font-family:'Amiri',serif;
  font-size:26px;
  line-height:1.8;
  color:var(--tm);
  text-align:center;
  direction:rtl;
  margin-bottom:8px;
  animation:fu 1.2s ease-out 1s both;
  transition:color .8s,opacity .6s; 
  text-shadow: 1px 1px 0px var(--shadow-light);
}

.ai{font-size:12.5px;font-weight:500;font-style:italic;color:var(--ts);text-align:center;line-height:1.7;max-width:300px;margin-bottom:20px;animation:fu 1.2s ease-out 1.2s both;transition:color .8s,opacity .6s}

.sn{
  font-size:14px;
  font-weight:600;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--tm);
  animation:fu 1.2s ease-out 1.4s both;
  transition:color .8s,opacity .6s;
  opacity:.85; 
  text-shadow: 1px 1px 0px var(--shadow-light);
}

.ss{font-size:11px;font-weight:500;letter-spacing:2px;color:var(--tl);margin-top:4px;text-transform:uppercase;animation:fu 1.2s ease-out 1.5s both;transition:color .8s,opacity .6s}
.th{position:absolute;bottom:max(15px,env(safe-area-inset-bottom,15px));font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tl);opacity:0;animation:hp 4s ease-in-out 4s infinite}

@keyframes hp{0%,100%{opacity:0}15%,85%{opacity:.45}}
.tb{position:absolute;top:30px;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--a1);opacity:0;transition:opacity .3s;pointer-events:none;z-index:11; font-weight: 600;}.tb.sh{opacity:.7}
.rp{position:absolute;border-radius:50%;background:var(--a1);opacity:.12;transform:scale(0);animation:ra .8s ease-out forwards;pointer-events:none;z-index:10}

@keyframes ra{to{transform:scale(5);opacity:0}}
@keyframes fd{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}

/* HAPUS EFEK ZOOM UNTUK EXPORT - Gunakan proporsi murni */
.poster.zm .twc{transform:scale(1); box-shadow: none; border-radius: 0; background: transparent;} 
.poster.zm .gt,.poster.zm .hy,.poster.zm .ba,.poster.zm .at,.poster.zm .ai,.poster.zm .sn,.poster.zm .ss,.poster.zm .th{opacity:1!important;pointer-events:auto}
.poster.zm #BC{opacity:1;transition:opacity 0.8s}

/* Tombol Export bergaya Neumorphism */
.exp-btn{
  position:fixed;
  bottom:max(90px,env(safe-area-inset-bottom,70px));
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background: var(--bg-color);
  color: var(--ts);
  border:none;
  font-size:22px;
  cursor:pointer;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow: 
    5px 5px 10px var(--shadow-dark), 
    -5px -5px 10px var(--shadow-light);
  transition: all 0.2s ease;
}
.exp-btn:active {
  box-shadow: 
    inset 4px 4px 8px var(--shadow-dark), 
    inset -4px -4px 8px var(--shadow-light);
  color: var(--a1);
}

.mbg{position:fixed;inset:0;background:rgba(224, 229, 236, 0.8); backdrop-filter: blur(5px); z-index:200;display:none;align-items:center;justify-content:center}.mbg.open{display:flex}

.mdl{
  background: var(--bg-color);
  border-radius: 24px;
  padding:32px;
  width:320px;
  text-align:center;
  box-shadow: 
    12px 12px 24px var(--shadow-dark), 
    -12px -12px 24px var(--shadow-light);
}
.mdl h3{font-size:18px;margin-bottom:6px;color:var(--tm); font-weight: 600;}
.mdl p{font-size:12px;color:var(--ts);margin-bottom:24px}

.mbs{display:flex;flex-direction:column;gap:15px}
.mbs button{
  padding:14px;
  border: none;
  border-radius: 12px;
  background: var(--bg-color);
  font-family:'Cormorant Garamond',serif;
  font-size:14px;
  cursor:pointer;
  color:var(--tm);
  text-align:left;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow: 
    4px 4px 8px var(--shadow-dark), 
    -4px -4px 8px var(--shadow-light);
  transition: all 0.2s ease;
}
.mbs button:active{
  box-shadow: 
    inset 3px 3px 6px var(--shadow-dark), 
    inset -3px -3px 6px var(--shadow-light);
}
.mbs button b{min-width:36px; font-weight: 600; color: var(--a1);}
.mbs button small{font-size:11px;color:var(--ts)}

.prg{
  display:none;
  margin-top:20px;
  font-size:12px;
  color:var(--a1);
  padding:10px 16px;
  background: var(--bg-color);
  border-radius:10px;
  box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
  font-weight: 600;
}
.prg.show{display:block}

.mcl{
  margin-top:24px;
  padding:10px 20px;
  border:none;
  border-radius: 10px;
  background: var(--bg-color);
  font-size:13px;
  font-weight: 600;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--ts);
  cursor:pointer;
  box-shadow: 
    3px 3px 6px var(--shadow-dark), 
    -3px -3px 6px var(--shadow-light);
  transition: all 0.2s ease;
}
.mcl:active {
  box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
}

@media(max-width:640px){
  body{padding:0}
  .poster{width:100%;min-height:100vh;min-height:100dvh;padding:28px 18px;border-radius:0; box-shadow: none;}
  .kt{width:80vw;max-width:340px}
  .kt h1 { font-size: 56px; } 
  .at{font-size:22px}
  .cn{display:none}
}
</style>
</head>

<script>
var THEMES=[
{name:'Gold & Sage',a1:'#C4A96A',a2:'#8B9E7C',tm:'#5C4A28',ts:'#9E8E7E',tl:'#C4B5A5',dots:'#3A3A3A',trail:'#9E8E7E',splat:'#4A4A4A',bd:'#C4A96A'},
{name:'Ocean Teal',a1:'#2E8B8B',a2:'#5EAAA8',tm:'#0D4F4F',ts:'#3E8888',tl:'#8EBFBF',dots:'#2A5555',trail:'#5EAAA8',splat:'#3A6666',bd:'#5EAAA8'},
{name:'Royal Navy',a1:'#D4A854',a2:'#4A6FA5',tm:'#1B2D50',ts:'#6080B0',tl:'#A0B0D0',dots:'#2A3855',trail:'#4A6FA5',splat:'#354870',bd:'#4A6FA5'},
{name:'Rose Garden',a1:'#C07088',a2:'#88A870',tm:'#6B2040',ts:'#B06880',tl:'#D4A0B0',dots:'#5A2838',trail:'#88A870',splat:'#704050',bd:'#C07088'},
{name:'Terracotta',a1:'#CC7744',a2:'#7BA05A',tm:'#5C2E10',ts:'#B07040',tl:'#D4A880',dots:'#4A2818',trail:'#7BA05A',splat:'#6A4030',bd:'#CC7744'},
{name:'Emerald Forest',a1:'#5DAA68',a2:'#3C8050',tm:'#0E3A18',ts:'#3C8050',tl:'#80C090',dots:'#1A4020',trail:'#3C8050',splat:'#2A5030',bd:'#5DAA68'}
];
var CUR_THEME=0;
</script>

<script>
// --- SCRIPT UNTUK BACKGROUND CANVAS ---
(function(){
  var c=document.getElementById('BC');
  var p=document.getElementById('P');
  var twc=document.getElementById('TWC');
  if(!c||!p)return;
  var x=c.getContext('2d');
  var pw,ph,dots=[];
  var kcx,kcy; 
  var drawScale = 1; 

  var bigOrbs=[];
  var bigArcs=[];

  function resize(){
    var d=window.devicePixelRatio||1;
    pw=p.offsetWidth;ph=p.offsetHeight;
    c.width=pw*d;c.height=ph*d;
    c.style.width=pw+'px';c.style.height=ph+'px';
    x.setTransform(d,0,0,d,0,0);
    
    if(twc){
      var pr=p.getBoundingClientRect();
      var tr=twc.getBoundingClientRect();
      kcx=tr.left-pr.left+tr.width/2;
      kcy=tr.top-pr.top+tr.height/2;
      drawScale = tr.width / 1000; 
    }else{
      kcx=pw/2;kcy=ph*0.28;
    }
    initDots();
    initBigOrbs();
  }

  function initDots(){
    dots=[];
    for(var i=0;i<180;i++) dots.push({x:Math.random()*pw,y:Math.random()*ph,r:1.5+Math.random()*6,o:0.05+Math.random()*0.16,vx:(Math.random()-0.5)*0.25,vy:(Math.random()-0.5)*0.2,ph:Math.random()*Math.PI*2,ps:0.008+Math.random()*0.02,bl:Math.random()>0.4});
    for(var i=0;i<60;i++) dots.push({x:Math.random()*pw,y:Math.random()*ph,r:8+Math.random()*20,o:0.03+Math.random()*0.08,vx:(Math.random()-0.5)*0.12,vy:(Math.random()-0.5)*0.1,ph:Math.random()*Math.PI*2,ps:0.005+Math.random()*0.012,bl:true});
  }

  function initBigOrbs(){
    bigOrbs=[];bigArcs=[];
    var configs=[];
    var startR = 180 * drawScale; 
    var step = 30 * drawScale;    
    var nBase = 42;
    var pRatio = 0.39; 
    
    for(var ci=0;ci<8;ci++){ 
      var r=startR+step*ci;
      var np=Math.max(24, nBase-ci);
      configs.push({rx:r, ry:Math.round(r*pRatio), n:np, sp:0.0007/(1+ci*0.35), sz:Math.max(0.5,1.2-ci*0.03)});
    }
    for(var oi=0;oi<configs.length;oi++){
      var cf=configs[oi],pp=[];
      for(var pi=0;pi<cf.n;pi++) pp.push({a:(Math.PI*2/cf.n)*pi+Math.random()*0.3,f:(Math.random()-0.5)*2,s:0.85+Math.random()*0.3,z:cf.sz*(0.7+Math.random()*0.5)});
      bigOrbs.push({rx:cf.rx,ry:cf.ry,sp:cf.sp,p:pp});
      for(var j=0;j<2+Math.floor(Math.random()*3);j++){
        bigArcs.push({rx:cf.rx+(Math.random()-0.5)*2,ry:cf.ry+(Math.random()-0.5)*2,s:Math.random()*Math.PI*2,w:1+Math.random()*3,l:0.3+Math.random()*0.6,o:0.07+Math.random()*0.08,d:Math.random()>0.5});
      }
    }
  }

  function draw(){
    x.clearRect(0,0,pw,ph);
    var t=THEMES[CUR_THEME];

    for(var i=0;i<bigOrbs.length;i++){
      x.beginPath();x.ellipse(kcx,kcy,bigOrbs[i].rx,bigOrbs[i].ry,0,0,Math.PI*2);
      x.strokeStyle=t.trail;x.globalAlpha=0.12;x.lineWidth=0.4;x.stroke();
    }
    x.globalAlpha=1;

    for(var i=0;i<bigArcs.length;i++){
      var a=bigArcs[i];
      x.beginPath();x.ellipse(kcx,kcy,a.rx,a.ry,0,a.s,a.s+a.w);
      x.strokeStyle=t.trail;x.globalAlpha=a.o;x.lineWidth=a.l;
      x.lineCap='round';x.setLineDash(a.d?[4,8]:[]);x.stroke();
    }
    x.setLineDash([]);x.globalAlpha=1;

    for(var i=0;i<bigOrbs.length;i++){
      var ob=bigOrbs[i];
      for(var j=0;j<ob.p.length;j++){
        var pp=ob.p[j];
        pp.a-=ob.sp*pp.s;
        var orx=ob.rx,ory=ob.ry;
        var px=kcx+Math.cos(pp.a)*orx,py=kcy+Math.sin(pp.a)*ory;
        if(px>-30&&px<pw+30&&py>-30&&py<ph+30){
          x.fillStyle=t.dots;
          if(Math.sin(pp.a)<0.1){
            x.globalAlpha=0.18;
            x.beginPath();x.arc(px,py,pp.z*0.6,0,Math.PI*2);x.fill();
          }else{
            x.globalAlpha=0.22+Math.sin(pp.a)*0.15;
            x.beginPath();x.arc(px,py-pp.z*0.9,pp.z*0.45,0,Math.PI*2);x.fill();
            x.beginPath();x.ellipse(px,py+pp.z*0.1,pp.z*0.35,pp.z*0.7,0,0,Math.PI*2);x.fill();
          }
        }
      }
    }
    x.globalAlpha=1;

    var fadeTop=ph*0.40;
    var fadeBot=ph*1.0;
    var blend=ph*0.06;

    var g1=x.createLinearGradient(0,fadeTop-blend,0,fadeTop+blend*0.8);
    g1.addColorStop(0,'rgba(224,229,236,0)'); 
    g1.addColorStop(0.3,'rgba(224,229,236,0)');g1.addColorStop(1,'rgba(224,229,236,0.72)');
    x.fillStyle=g1;
    x.fillRect(0,fadeTop-blend,pw,blend*1.8);

    x.fillStyle='rgba(224,229,236,0.72)'; 
    x.fillRect(0,fadeTop+blend*0.8,pw,fadeBot-blend-(fadeTop+blend*0.8));

    var g2=x.createLinearGradient(0,fadeBot-blend,0,fadeBot+blend);
    g2.addColorStop(0,'rgba(224,229,236,0.72)'); 
    g2.addColorStop(1,'rgba(224,229,236,0)');
    x.fillStyle=g2;
    x.fillRect(0,fadeBot-blend,pw,blend*2);

    for(var i=0;i<dots.length;i++){
      var d=dots[i];
      d.x+=d.vx;d.y+=d.vy;d.ph+=d.ps;
      if(d.x<-20)d.x=pw+20;if(d.x>pw+20)d.x=-20;
      if(d.y<-20)d.y=ph+20;if(d.y>ph+20)d.y=-20;
      x.globalAlpha=d.o*(0.5+0.2*Math.sin(d.ph)); 
      if(d.bl&&d.r>4){var g=x.createRadialGradient(d.x,d.y,0,d.x,d.y,d.r);g.addColorStop(0,t.bd);g.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=g;}
      else{x.fillStyle=t.bd;}
      x.beginPath();x.arc(d.x,d.y,d.r,0,Math.PI*2);x.fill();
    }
    x.globalAlpha=1;

    requestAnimationFrame(draw);
  }

  resize();draw();
  window.addEventListener('resize',resize);
})();
</script>

<script>
// --- SCRIPT UNTUK KA'BAH CANVAS ---
(function(){
  var tc=document.getElementById('TC');
  var twc=document.getElementById('TWC');
  if(!tc||!twc)return;
  var x=tc.getContext('2d');
  var W,H,cx,cy;
  var KA_BODY='#2C2C2C',KA_BAND='#C4A96A';
  
  var scaleX = 1.4; 
  var scaleY = 1.4; 
  var drawScale = 1; 

  function resize(){
    var d=window.devicePixelRatio||1;
    W=twc.offsetWidth;H=twc.offsetHeight;
    tc.width=W*d;tc.height=H*d;
    tc.style.width=W+'px';tc.style.height=H+'px';
    x.setTransform(d,0,0,d,0,0);
    cx=W/2;cy=H/2;
    
    if (W > 0) { drawScale = W / 1000; }
    
    makeSplat();
    initOrbs(); 
  }

  var sp=[];
  function makeSplat(){
    sp=[];
    for(var i=0;i<150;i++){var a=Math.random()*Math.PI*2,d=(40+Math.random()*220)*drawScale;sp.push({x:cx+Math.cos(a)*d*(0.7+Math.random()*0.7),y:cy+Math.sin(a)*d*(0.35+Math.random()*0.35),r:0.5+Math.random()*3,o:0.05+Math.random()*0.28});}
    for(var i=0;i<30;i++){var a=Math.random()*Math.PI*2,d=(120+Math.random()*190)*drawScale;sp.push({x:cx+Math.cos(a)*d*(0.9+Math.random()*0.5),y:cy+Math.sin(a)*d*(0.4+Math.random()*0.3),r:2.5+Math.random()*5,o:0.02+Math.random()*0.09});}
  }

  var oc=[], orbs=[], arcs=[];
  function initOrbs() {
    oc=[
      {rx:60 * drawScale, ry:23 * drawScale, n:14, sp:0.003, sz:1.5},
      {rx:100 * drawScale, ry:39 * drawScale, n:20, sp:0.0024, sz:1.8},
      {rx:140 * drawScale, ry:54 * drawScale, n:28, sp:0.0018, sz:2.0},
      {rx:180 * drawScale, ry:70 * drawScale, n:34, sp:0.0013, sz:1.9}
    ];
    orbs=[];arcs=[];
    for(var oi=0;oi<oc.length;oi++){
      var c=oc[oi],pp=[];
      for(var pi=0;pi<c.n;pi++) pp.push({a:(Math.PI*2/c.n)*pi+Math.random()*0.25,f:(Math.random()-0.5)*1.5,s:0.88+Math.random()*0.24,z:c.sz*(0.75+Math.random()*0.5)});
      orbs.push({rx:c.rx,ry:c.ry,sp:c.sp,p:pp});
      for(var j=0;j<2+Math.floor(Math.random()*2);j++) arcs.push({rx:c.rx+(Math.random()-0.5)*5,ry:c.ry+(Math.random()-0.5)*3,s:Math.random()*Math.PI*2,w:1.5+Math.random()*3.5,l:0.3+Math.random()*1.5,o:0.04+Math.random()*0.09,d:Math.random()>0.6});
    }
  }

  function drawKaaba(){
    var sX = scaleX * drawScale;
    var sY = scaleY * drawScale;
      
    var w = 40 * sX; 
    var h = 60 * sY; 
    var kx = cx;
    var ky = cy - (6 * sY);
    var tilt = 16 * sY; 
    
    x.save();
    
    x.fillStyle = '#222';
    x.beginPath();
    x.moveTo(kx - w, ky);
    x.lineTo(kx, ky + tilt);
    x.lineTo(kx, ky + tilt - h);
    x.lineTo(kx - w, ky - h);
    x.closePath();
    x.fill();
    
    x.fillStyle = '#111';
    x.beginPath();
    x.moveTo(kx, ky + tilt);
    x.lineTo(kx + w, ky);
    x.lineTo(kx + w, ky - h);
    x.lineTo(kx, ky + tilt - h);
    x.closePath();
    x.fill();
    
    x.fillStyle = '#333';
    x.beginPath();
    x.moveTo(kx - w, ky - h);
    x.lineTo(kx, ky + tilt - h);
    x.lineTo(kx + w, ky - h);
    x.lineTo(kx, ky - h - tilt);
    x.closePath();
    x.fill();
    
    var bH = 4.5 * sY; 
    var bY = -22 * sY; 
    
    x.fillStyle = KA_BAND;
    x.beginPath();
    x.moveTo(kx - w, ky + bY);
    x.lineTo(kx, ky + tilt + bY);
    x.lineTo(kx, ky + tilt + bY - bH);
    x.lineTo(kx - w, ky + bY - bH);
    x.closePath();
    x.fill();
    
    x.fillStyle = '#A8905A';
    x.beginPath();
    x.moveTo(kx, ky + tilt + bY);
    x.lineTo(kx + w, ky + bY);
    x.lineTo(kx + w, ky + bY - bH);
    x.lineTo(kx, ky + tilt + bY - bH);
    x.closePath();
    x.fill();
    
    var dW = 6.5 * sX;
    var dH = 13 * sY;
    var dX = 7 * sX; 
    var dY = 3 * sY; 
    
    x.fillStyle = '#A8905A';
    x.beginPath();
    var dBaseY = ky + tilt - dX * (tilt/w) - dY;
    var dRightY = ky + tilt - (dX+dW) * (tilt/w) - dY;
    x.moveTo(kx + dX, dBaseY);
    x.lineTo(kx + dX + dW, dRightY);
    x.lineTo(kx + dX + dW, dRightY - dH);
    x.lineTo(kx + dX, dBaseY - dH);
    x.closePath();
    x.fill();
    
    x.restore();
  }

  function draw(){
    var t=THEMES[CUR_THEME];
    x.clearRect(0,0,W,H);

    for(var i=0;i<sp.length;i++){x.beginPath();x.arc(sp[i].x,sp[i].y,sp[i].r,0,Math.PI*2);x.fillStyle=t.splat;x.globalAlpha=sp[i].o;x.fill();}
    x.globalAlpha=1;

    for(var i=0;i<orbs.length;i++){
      x.beginPath();x.ellipse(cx,cy,orbs[i].rx,orbs[i].ry,0,0,Math.PI*2);
      x.strokeStyle=t.trail;x.globalAlpha=0.10;x.lineWidth=0.4;x.stroke();
    }
    x.globalAlpha=1;

    for(var i=0;i<orbs.length;i++){
      for(var j=0;j<orbs[i].p.length;j++){
        var p=orbs[i].p[j];
        p.a-=orbs[i].sp*p.s;
        var rx=orbs[i].rx,ry=orbs[i].ry;
        var px=cx+Math.cos(p.a)*rx,py=cy+Math.sin(p.a)*ry;
        if(Math.sin(p.a)<0.1){x.beginPath();x.arc(px,py,p.z*0.65,0,Math.PI*2);x.fillStyle=t.dots;x.globalAlpha=0.18;x.fill();}
      }
    }
    x.globalAlpha=1;

    drawKaaba();

    for(var i=0;i<orbs.length;i++){
      for(var j=0;j<orbs[i].p.length;j++){
        var p=orbs[i].p[j];
        var rx=orbs[i].rx,ry=orbs[i].ry;
        var px=cx+Math.cos(p.a)*rx,py=cy+Math.sin(p.a)*ry;
        if(Math.sin(p.a)>=0.1){
          x.fillStyle=t.dots;x.globalAlpha=0.32+Math.sin(p.a)*0.25;
          x.beginPath();x.arc(px,py-p.z*1.1,p.z*0.45,0,Math.PI*2);x.fill();
          x.beginPath();x.ellipse(px,py+p.z*0.15,p.z*0.35,p.z*0.75,0,0,Math.PI*2);x.fill();
        }
      }
    }
    x.globalAlpha=1;

    var g=x.createRadialGradient(cx,cy,10 * drawScale,cx,cy,80 * drawScale); 
    g.addColorStop(0,KA_BAND+'0D');g.addColorStop(1,KA_BAND+'00');
    x.fillStyle=g;x.beginPath();x.ellipse(cx,cy,80 * drawScale,45 * drawScale,0,0,Math.PI*2);x.fill(); 

    requestAnimationFrame(draw);
  }

  resize();draw();
  window.addEventListener('resize',resize);
})();
</script>

<script>

<script>

        ex.lineWidth = 16 * sc;
        ex.strokeStyle = colorBg;

        ex.shadowBlur = 10 * sc;
        ex.shadowOffsetX = -5 * sc;
        ex.shadowOffsetY = -5 * sc;
        ex.stroke();
        
        ex.restore(); 
        
        // --- MENGGAMBAR TEKS (DITURUNKAN POSISINYA KE BATAS MERAH) ---
        var textTop = twY + twH + 150 * sc; // Menambah offset awal agar teks turun drastis
        ex.textAlign = 'center';
        
        var y1 = textTop + 50 * sc; // Menambah jarak antar baris agar lebih lega
        ex.fillStyle = colorTm;

        ex.fillText('S E L A M A T   H A R I   R A Y A', ew / 2, y1);
        
        var y2 = y1 + 90 * sc; // Menambah jarak ke judul besar
        ex.font = '700 ' + Math.round(72 * sc) + 'px Amiri';
        ex.shadowColor = colorShadowLight; ex.shadowOffsetX = 1.5 * sc; ex.shadowOffsetY = 1.5 * sc;
        ex.fillText('Idul Fitri', ew / 2, y2);
        
        var y3 = y2 + 65 * sc; // Menurunkan teks 1447 H ke dekat batas merah
        ex.fillStyle = colorA1;
        ex.shadowColor = 'transparent'; 
        ex.font = '600 ' + Math.round(17 * sc) + 'px Cormorant Garamond';
        ex.fillText('1  4  4  7   H', ew / 2, y3);
        
        var y4 = y3 + 35 * sc; // Jarak pemisah diturunkan
        ex.shadowColor = 'transparent';
        ex.strokeStyle = colorA2;
        ex.globalAlpha = 0.5;
        ex.lineWidth = sc;
        ex.beginPath(); ex.moveTo(ew / 2 - 74 * sc, y4); ex.lineTo(ew / 2 - 14 * sc, y4); ex.stroke();

        ex.globalAlpha = 0.7; ex.fillStyle = colorA2;

        var y7 = y6 + 95 * sc; // Menurunkan nama keluarga ke bagian paling bawah
        ex.fillStyle = colorTm;
        ex.globalAlpha = 0.85;
        ex.font = '600 ' + Math.round(14 * sc) + 'px Cormorant Garamond';

        ex.fillText('M U H D A N   S Y A R O V Y   &   K E L U A R G A', ew / 2, y7);
        ex.globalAlpha = 1;
        
        var mime=fmt==='png'?'image/png':'image/jpeg';
        ec.toBlob(function(blob){var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download='idul-fitri-1447h.'+fmt;a.click();URL.revokeObjectURL(u);PRG.className='prg';},mime,0.95);
      }
    },100);
  }

  function captureGif(){
    var gw=1080,gh=2340,frames=55,delay=11;
    var gc=document.createElement('canvas');gc.width=gw;gc.height=gh;
    var gx=gc.getContext('2d');
    var fdata=[],f=0;
    
    var p = document.getElementById('P');
    var colorTm = getComputedStyle(p).getPropertyValue('--tm').trim();
    var colorA1 = getComputedStyle(p).getPropertyValue('--a1').trim();
    var colorA2 = getComputedStyle(p).getPropertyValue('--a2').trim();
    var colorTs = getComputedStyle(p).getPropertyValue('--ts').trim();
    var colorBg = getComputedStyle(p).getPropertyValue('--bg-color').trim();
    var colorShadowLight = getComputedStyle(p).getPropertyValue('--shadow-light').trim();
    var colorShadowDark = getComputedStyle(p).getPropertyValue('--shadow-dark').trim();

    function grab(){
      PRG.textContent='Frame '+(f+1)+'/'+frames+'...';
      gx.fillStyle=colorBg; 
      gx.fillRect(0,0,gw,gh);
      
      var twc = document.getElementById('TWC');
      var pw = p.offsetWidth;
      var ph = p.offsetHeight;
      var pr = p.getBoundingClientRect();
      var tr = twc.getBoundingClientRect();
      var kcx = tr.left - pr.left + tr.width / 2;
      var kcy = tr.top - pr.top + tr.height / 2;

      var twX = expKcx - twW / 2;
      var twY = expKcy - twH / 2;

      var sc = gw / 540;

      gx.beginPath();

      gx.ellipse(expKcx, expKcy, twW / 2 + 8 * sc, twH / 2 + 8 * sc, 0, 0, Math.PI * 2);

      gx.strokeStyle = colorBg; 
      gx.shadowColor = colorShadowDark;
      gx.shadowBlur = 10 * sc;
      gx.shadowOffsetX = 5 * sc;
      gx.shadowOffsetY = 5 * sc;
      gx.stroke();
      
      gx.beginPath();
      gx.ellipse(expKcx, expKcy, twW / 2 + 8 * sc, twH / 2 + 8 * sc, 0, 0, Math.PI * 2);
      gx.lineWidth = 16 * sc;
      gx.strokeStyle = colorBg;
      gx.shadowColor = colorShadowLight;
      gx.shadowBlur = 10 * sc;
      gx.shadowOffsetX = -5 * sc;
      gx.shadowOffsetY = -5 * sc;
      gx.stroke();
      
      gx.restore(); 
      
      // --- MENGGAMBAR TEKS UNTUK GIF (MENYAMAKAN POSISI DENGAN PNG) ---
      var textTop = twY + twH + 150 * sc; 
      gx.textAlign = 'center';

      gx.fillStyle = colorTm;

      gx.fillText('S E L A M A T   H A R I   R A Y A', gw / 2, tY);
      
      var y2 = tY + 90 * sc; 
      gx.font = '700 ' + Math.round(72 * sc) + 'px Amiri';
      gx.shadowColor = colorShadowLight; gx.shadowOffsetX = 1.5 * sc; gx.shadowOffsetY = 1.5 * sc;
      gx.fillText('Idul Fitri', gw / 2, y2);
      
      var y3 = y2 + 65 * sc; 
      gx.fillStyle = colorA1;
      gx.shadowColor = 'transparent'; 
      gx.font = '600 ' + Math.round(17 * sc) + 'px Cormorant Garamond';

      gx.globalAlpha = 0.7; gx.fillStyle = colorA2;
      gx.beginPath(); gx.arc(gw / 2, y4, 5 * sc, 0, Math.PI * 2); gx.fill(); gx.globalAlpha = 1;
      
      var y5 = y4 + 45 * sc;
      gx.fillStyle = colorTm;
      gx.font = '400 ' + Math.round(26 * sc) + 'px Amiri';
      gx.shadowColor = colorShadowLight; gx.shadowOffsetX = 1.5 * sc; gx.shadowOffsetY = 1.5 * sc; gx.shadowBlur = 0;
      gx.fillText('\u062A\u064E\u0642\u064E\u0628\u0651\u064E\u0644\u064E \u0627\u0644\u0644\u0651\u064E\u0647\u064F \u0645\u0650\u0646\u0651\u064E\u0627 \u0648\u064E\u0645\u0650\u0646\u0652\u0643\u064F\u0645\u0652', gw / 2, y5);
      
      var y6 = y5 + 35 * sc;
      gx.fillStyle = colorTs;
      gx.shadowColor = 'transparent'; 
      gx.font = 'italic 500 ' + Math.round(12.5 * sc) + 'px Cormorant Garamond';
      gx.fillText('"Semoga Allah menerima amalan', gw / 2, y6);
      gx.fillText('dari kami dan darimu sekalian"', gw / 2, y6 + 20 * sc);
      
      var y7 = y6 + 95 * sc;
      gx.fillStyle = colorTm;
      gx.globalAlpha = 0.85;
      gx.font = '600 ' + Math.round(14 * sc) + 'px Cormorant Garamond';
      gx.shadowColor = colorShadowLight; gx.shadowOffsetX = 1.5 * sc; gx.shadowOffsetY = 1.5 * sc;
      gx.fillText('M U H D A N   S Y A R O V Y   &   K E L U A R G A', gw / 2, y7);
      gx.globalAlpha = 1;
      
      fdata.push(gx.getImageData(0,0,gw,gh));
      f++;
      if(f<frames){setTimeout(grab,120);}
      else{encGif(fdata,gw,gh,delay);}
    }
    grab();
  }

  function encGif(frames,w,h,del){
    PRG.textContent='Building palette...';
    setTimeout(function(){
      var pal=mkPal(frames);
      PRG.textContent='Quantizing...';
      setTimeout(function(){
        var idx=[];
        for(var f=0;f<frames.length;f++){idx.push(quant(frames[f],pal,w,h));if(f%6===0)PRG.textContent='Quantize '+(f+1)+'/'+frames.length;}
        PRG.textContent='Compressing...';
        setTimeout(function(){
