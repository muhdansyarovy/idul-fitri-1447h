<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="theme-color" content="#FAFAF7">
<title>Selamat Hari Raya Idul Fitri 1447 H</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--a1:#C4A96A;--a2:#8B9E7C;--tm:#5C4A28;--ts:#9E8E7E;--tl:#C4B5A5}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}body{background:#FAFAF7;display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;font-family:'Cormorant Garamond',serif;padding:0;margin:0}
.poster{width:100%;max-width:540px;min-height:100vh;min-height:100dvh;background:#FAFAF7;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 40px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.poster>*{position:relative;z-index:2}.poster{padding-top:max(44px,env(safe-area-inset-top,44px));padding-bottom:max(32px,env(safe-area-inset-bottom,32px))}
#BC{position:absolute;inset:0;z-index:0;pointer-events:none;width:100%;height:100%}
.fb{position:absolute;inset:16px;border:0.5px solid var(--a1);opacity:0.15;pointer-events:none;z-index:1}
.cn{position:absolute;width:20px;height:20px;z-index:3}.cn::before,.cn::after{content:'';position:absolute;background:var(--a1);opacity:0.3;transition:background .8s}
.c1{top:14px;left:14px}.c1::before{width:20px;height:.5px}.c1::after{width:.5px;height:20px}
.c2{top:14px;right:14px}.c2::before{top:0;right:0;width:20px;height:.5px}.c2::after{top:0;right:0;width:.5px;height:20px}
.c3{bottom:14px;left:14px}.c3::before{bottom:0;left:0;width:20px;height:.5px}.c3::after{bottom:0;left:0;width:.5px;height:20px}
.c4{bottom:14px;right:14px}.c4::before{bottom:0;right:0;width:20px;height:.5px}.c4::after{bottom:0;right:0;width:.5px;height:20px}
.twc{width:380px;height:310px;margin-bottom:22px;position:relative;animation:fi 1.5s ease-out both;transition:transform 1.2s cubic-bezier(.4,0,.2,1),margin 1.2s}
#TC{width:100%;height:100%;display:block}
.gt{font-size:13px;font-weight:400;letter-spacing:5px;text-transform:uppercase;color:var(--ts);margin-bottom:5px;animation:fd 1.2s ease-out .3s both;transition:color .8s,opacity .6s}
.kt{width:340px;margin-bottom:8px;animation:fd 1.2s ease-out .5s both;text-align:center;transition:opacity .6s}
.kt img{width:100%;height:auto;display:block}
.hy{font-size:17px;font-weight:300;letter-spacing:8px;color:var(--a1);margin-bottom:32px;animation:fd 1.2s ease-out .7s both;transition:color .8s,opacity .6s}
.ba{display:flex;align-items:center;gap:14px;margin-bottom:26px;animation:fi 1.6s ease-out .9s both;transition:opacity .6s}
.bll{width:44px;height:1px;background:var(--a2);opacity:.5;transition:background .8s}
.bdd{width:5px;height:5px;background:var(--a2);border-radius:50%;opacity:.7;transition:background .8s}
.at{font-family:'Amiri',serif;font-size:26px;line-height:1.8;color:var(--tm);text-align:center;direction:rtl;margin-bottom:8px;animation:fu 1.2s ease-out 1s both;transition:color .8s,opacity .6s}
.ai{font-size:12.5px;font-weight:400;font-style:italic;color:var(--ts);text-align:center;line-height:1.7;max-width:300px;margin-bottom:40px;animation:fu 1.2s ease-out 1.2s both;transition:color .8s,opacity .6s}
.sn{font-size:14px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--tm);animation:fu 1.2s ease-out 1.4s both;transition:color .8s,opacity .6s;opacity:.85}
.ss{font-size:11px;font-weight:300;letter-spacing:2px;color:var(--tl);margin-top:4px;text-transform:uppercase;animation:fu 1.2s ease-out 1.5s both;transition:color .8s,opacity .6s}
.th{position:absolute;bottom:max(6px,env(safe-area-inset-bottom,6px));font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tl);opacity:0;animation:hp 4s ease-in-out 4s infinite}
@keyframes hp{0%,100%{opacity:0}15%,85%{opacity:.45}}
.tb{position:absolute;top:24px;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--a1);opacity:0;transition:opacity .3s;pointer-events:none;z-index:11}.tb.sh{opacity:.7}
.rp{position:absolute;border-radius:50%;background:var(--a1);opacity:.12;transform:scale(0);animation:ra .8s ease-out forwards;pointer-events:none;z-index:10}
@keyframes ra{to{transform:scale(5);opacity:0}}
@keyframes fd{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.poster.zm .twc{transform:scale(2.8);margin-bottom:180px;margin-top:80px}
.poster.zm .gt,.poster.zm .hy,.poster.zm .ba,.poster.zm .at,.poster.zm .ai,.poster.zm .sn,.poster.zm .ss,.poster.zm .th{opacity:0!important;pointer-events:none}
.exp-btn{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,0px));right:20px;width:48px;height:48px;border-radius:50%;background:#2C2C2C;color:#fff;border:none;font-size:20px;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}.mbg.open{display:flex}
.mdl{background:#fff;border-radius:16px;padding:32px;width:320px;text-align:center}
.mdl h3{font-size:18px;margin-bottom:6px;color:#2C2C2C}.mdl p{font-size:12px;color:#9E8E7E;margin-bottom:20px}
.mbs{display:flex;flex-direction:column;gap:10px}
.mbs button{padding:14px;border:1px solid #E0D8D0;border-radius:10px;background:#FAFAF7;font-family:'Cormorant Garamond',serif;font-size:14px;cursor:pointer;color:#2C2C2C;text-align:left;display:flex;align-items:center;gap:10px}
.mbs button:hover{background:#F0EBE4;border-color:#C4A96A}
.mbs button b{min-width:36px}
.mbs button small{font-size:11px;color:#9E8E7E}
.prg{display:none;margin-top:14px;font-size:12px;color:#5C4A28;padding:8px 16px;background:#F5F0E8;border-radius:8px}.prg.show{display:block}
.mcl{margin-top:16px;padding:10px;border:none;background:none;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#9E8E7E;cursor:pointer}
@media(max-width:580px){body{padding:0}.poster{width:100%;min-height:100vh;min-height:100dvh;padding:28px 18px;border-radius:0}.twc{width:88vw;height:68vw;max-width:380px;max-height:310px}.kt{width:80vw;max-width:340px}.at{font-size:22px}.fb{inset:10px}.cn{display:none}}
</style>
</head>

<!-- SCRIPT 2: Background particles -->

<script>
(function(){
  var c=document.getElementById('BC');
  var p=document.getElementById('P');
  var twc=document.getElementById('TWC');
  if(!c||!p)return;
  var x=c.getContext('2d');
  var pw,ph,dots=[];
  var kcx,kcy; /* Ka'bah center relative to poster */

  /* Extra large orbits that fill the whole poster */
  var bigOrbs=[];
  var bigArcs=[];

  function resize(){
    var d=window.devicePixelRatio||1;
    pw=p.offsetWidth;ph=p.offsetHeight;
    c.width=pw*d;c.height=ph*d;
    c.style.width=pw+'px';c.style.height=ph+'px';
    x.setTransform(d,0,0,d,0,0);
    /* Ka'bah center = center of TWC container relative to poster */
    if(twc){
      var pr=p.getBoundingClientRect();
      var tr=twc.getBoundingClientRect();
      kcx=tr.left-pr.left+tr.width/2;
      kcy=tr.top-pr.top+tr.height/2;
    }else{
      kcx=pw/2;kcy=ph*0.28;
    }
    initDots();
    initBigOrbs();
  }

  function initDots(){
    dots=[];
    for(var i=0;i<180;i++) dots.push({x:Math.random()*pw,y:Math.random()*ph,r:1.5+Math.random()*6,o:0.05+Math.random()*0.16,vx:(Math.random()-0.5)*0.25,vy:(Math.random()-0.5)*0.2,ph:Math.random()*Math.PI*2,ps:0.008+Math.random()*0.02,bl:Math.random()>0.4});
    for(var i=0;i<60;i++) dots.push({x:Math.random()*pw,y:Math.random()*ph,r:8+Math.random()*20,o:0.03+Math.random()*0.08,vx:(Math.random()-0.5)*0.12,vy:(Math.random()-0.5)*0.1,ph:Math.random()*Math.PI*2,ps:0.005+Math.random()*0.012,bl:true});
  }

  function initBigOrbs(){
    bigOrbs=[];bigArcs=[];
    /* Extended orbits covering entire poster height */
    var configs=[];
    var startR=40, step=32, nBase=42;
    /* ratio matches poster aspect for visual symmetry */
    var pRatio=0.42; /* horizontal ellipse like tawaf bird-eye view */
    for(var ci=0;ci<22;ci++){
      var r=startR+step*ci;
      var np=Math.max(24, nBase-ci);
      configs.push({rx:r, ry:Math.round(r*pRatio), n:np, sp:0.0007/(1+ci*0.35), sz:Math.max(0.5,1.2-ci*0.03)});
    }
    for(var oi=0;oi<configs.length;oi++){
      var cf=configs[oi],pp=[];
      for(var pi=0;pi<cf.n;pi++) pp.push({a:(Math.PI*2/cf.n)*pi+Math.random()*0.3,f:(Math.random()-0.5)*2,s:0.85+Math.random()*0.3,z:cf.sz*(0.7+Math.random()*0.5)});
      bigOrbs.push({rx:cf.rx,ry:cf.ry,sp:cf.sp,p:pp});
      /* Trail arcs for each orbit */
      for(var j=0;j<2+Math.floor(Math.random()*3);j++){
        bigArcs.push({rx:cf.rx+(Math.random()-0.5)*2,ry:cf.ry+(Math.random()-0.5)*2,s:Math.random()*Math.PI*2,w:1+Math.random()*3,l:0.3+Math.random()*0.6,o:0.07+Math.random()*0.08,d:Math.random()>0.5});
      }
    }
  }

  function draw(){
    x.clearRect(0,0,pw,ph);
    var t=THEMES[CUR_THEME];

    /* 1. Draw ALL big orbit rings - full smooth ellipses */
    for(var i=0;i<bigOrbs.length;i++){
      x.beginPath();x.ellipse(kcx,kcy,bigOrbs[i].rx,bigOrbs[i].ry,0,0,Math.PI*2);
      x.strokeStyle=t.trail;x.globalAlpha=0.12;x.lineWidth=0.4;x.stroke();
    }
    x.globalAlpha=1;

    /* 2. Draw ALL big orbit trail arcs */
    for(var i=0;i<bigArcs.length;i++){
      var a=bigArcs[i];
      x.beginPath();x.ellipse(kcx,kcy,a.rx,a.ry,0,a.s,a.s+a.w);
      x.strokeStyle=t.trail;x.globalAlpha=a.o;x.lineWidth=a.l;
      x.lineCap='round';x.setLineDash(a.d?[4,8]:[]);x.stroke();
    }
    x.setLineDash([]);x.globalAlpha=1;

    /* 3. Draw ALL big orbit people */
    for(var i=0;i<bigOrbs.length;i++){
      var ob=bigOrbs[i];
      for(var j=0;j<ob.p.length;j++){
        var pp=ob.p[j];
        pp.a-=ob.sp*pp.s;
        var orx=ob.rx,ory=ob.ry;
        var px=kcx+Math.cos(pp.a)*orx,py=kcy+Math.sin(pp.a)*ory;
        if(px>-30&&px<pw+30&&py>-30&&py<ph+30){
          x.fillStyle=t.dots;
          if(Math.sin(pp.a)<0.1){
            x.globalAlpha=0.18;
            x.beginPath();x.arc(px,py,pp.z*0.6,0,Math.PI*2);x.fill();
          }else{
            x.globalAlpha=0.22+Math.sin(pp.a)*0.15;
            x.beginPath();x.arc(px,py-pp.z*0.9,pp.z*0.45,0,Math.PI*2);x.fill();
            x.beginPath();x.ellipse(px,py+pp.z*0.1,pp.z*0.35,pp.z*0.7,0,0,Math.PI*2);x.fill();
          }
        }
      }
    }
    x.globalAlpha=1;

    /* 4. White gradient overlay on text zone - fades orbits */
    var fadeTop=ph*0.40;
    var fadeBot=ph*1.0;
    var blend=ph*0.06;

    var g1=x.createLinearGradient(0,fadeTop-blend,0,fadeTop+blend*0.8);
    g1.addColorStop(0,'rgba(250,250,247,0)');
    g1.addColorStop(0.3,'rgba(250,250,247,0)');g1.addColorStop(1,'rgba(250,250,247,0.72)');
    x.fillStyle=g1;
    x.fillRect(0,fadeTop-blend,pw,blend*1.8);

    x.fillStyle='rgba(250,250,247,0.72)';
    x.fillRect(0,fadeTop+blend*0.8,pw,fadeBot-blend-(fadeTop+blend*0.8));

    var g2=x.createLinearGradient(0,fadeBot-blend,0,fadeBot+blend);
    g2.addColorStop(0,'rgba(250,250,247,0.72)');
    g2.addColorStop(1,'rgba(250,250,247,0)');
    x.fillStyle=g2;
    x.fillRect(0,fadeBot-blend,pw,blend*2);

    /* 5. Floating bubble particles - drawn LAST so always visible on top */
    for(var i=0;i<dots.length;i++){
      var d=dots[i];
      d.x+=d.vx;d.y+=d.vy;d.ph+=d.ps;
      if(d.x<-20)d.x=pw+20;if(d.x>pw+20)d.x=-20;
      if(d.y<-20)d.y=ph+20;if(d.y>ph+20)d.y=-20;
      x.globalAlpha=d.o*(0.7+0.3*Math.sin(d.ph));
      if(d.bl&&d.r>4){var g=x.createRadialGradient(d.x,d.y,0,d.x,d.y,d.r);g.addColorStop(0,t.bd);g.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=g;}
      else{x.fillStyle=t.bd;}
      x.beginPath();x.arc(d.x,d.y,d.r,0,Math.PI*2);x.fill();
    }
    x.globalAlpha=1;

    requestAnimationFrame(draw);
  }

  resize();draw();
  window.addEventListener('resize',resize);
})();
</script>

<!-- SCRIPT 3: Tawaf + Ka'bah animation -->

<script>
(function(){
  var tc=document.getElementById('TC');
  var twc=document.getElementById('TWC');
  if(!tc||!twc)return;
  var x=tc.getContext('2d');
  var W,H,cx,cy;
  var KA_BODY='#2C2C2C',KA_BAND='#C4A96A';

  function resize(){
    var d=window.devicePixelRatio||1;
    W=twc.offsetWidth;H=twc.offsetHeight;
    tc.width=W*d;tc.height=H*d;
    tc.style.width=W+'px';tc.style.height=H+'px';
    x.setTransform(d,0,0,d,0,0);
    cx=W/2;cy=H/2;
    makeSplat();
  }

  // Splatters (ink dots)
  var sp=[];
  function makeSplat(){
    sp=[];
    for(var i=0;i<110;i++){var a=Math.random()*Math.PI*2,d=30+Math.random()*165;sp.push({x:cx+Math.cos(a)*d*(0.7+Math.random()*0.7),y:cy+Math.sin(a)*d*(0.35+Math.random()*0.35),r:0.5+Math.random()*3,o:0.05+Math.random()*0.28});}
    for(var i=0;i<22;i++){var a=Math.random()*Math.PI*2,d=90+Math.random()*140;sp.push({x:cx+Math.cos(a)*d*(0.9+Math.random()*0.5),y:cy+Math.sin(a)*d*(0.4+Math.random()*0.3),r:2.5+Math.random()*5,o:0.02+Math.random()*0.09});}
  }

  // Orbit configs
  var oc=[{rx:40,ry:17,n:12,sp:0.003,sz:1.5},{rx:72,ry:30,n:18,sp:0.0024,sz:1.8},{rx:104,ry:44,n:24,sp:0.0018,sz:2.0},{rx:136,ry:57,n:28,sp:0.0013,sz:1.9},{rx:168,ry:71,n:30,sp:0.001,sz:1.6},{rx:200,ry:84,n:20,sp:0.0007,sz:1.3}];
  var orbs=[],arcs=[];

  for(var oi=0;oi<oc.length;oi++){
    var c=oc[oi],pp=[];
    for(var pi=0;pi<c.n;pi++) pp.push({a:(Math.PI*2/c.n)*pi+Math.random()*0.25,f:(Math.random()-0.5)*1.5,s:0.88+Math.random()*0.24,z:c.sz*(0.75+Math.random()*0.5)});
    orbs.push({rx:c.rx,ry:c.ry,sp:c.sp,p:pp});
    for(var j=0;j<2+Math.floor(Math.random()*2);j++) arcs.push({rx:c.rx+(Math.random()-0.5)*5,ry:c.ry+(Math.random()-0.5)*3,s:Math.random()*Math.PI*2,w:1.5+Math.random()*3.5,l:0.3+Math.random()*1.5,o:0.04+Math.random()*0.09,d:Math.random()>0.6});
  }

  function drawKaaba(){
    var kw=40,kh=45,kx=cx-kw/2-2,ky=cy-kh/2-13;
    x.save();
    // Shadow
    x.fillStyle='rgba(0,0,0,0.05)';x.beginPath();x.ellipse(cx,cy+kh/2+4,kw*0.6,5.5,0,0,Math.PI*2);x.fill();
    // Front
    x.fillStyle=KA_BODY;x.globalAlpha=0.92;x.fillRect(kx,ky,kw,kh);
    // Top
    x.beginPath();x.moveTo(kx,ky);x.lineTo(kx+8,ky-6);x.lineTo(kx+kw+8,ky-6);x.lineTo(kx+kw,ky);x.closePath();x.globalAlpha=0.65;x.fill();
    // Right
    x.beginPath();x.moveTo(kx+kw,ky);x.lineTo(kx+kw+8,ky-6);x.lineTo(kx+kw+8,ky+kh-6);x.lineTo(kx+kw,ky+kh);x.closePath();x.globalAlpha=0.48;x.fill();
    // Band
    x.globalAlpha=1;x.fillStyle=KA_BAND;x.globalAlpha=0.7;x.fillRect(kx,ky+13,kw,6);
    x.globalAlpha=0.3;x.fillRect(kx+kw,ky+12,8,6);
    // Band line
    x.globalAlpha=0.45;x.strokeStyle=KA_BAND;x.lineWidth=0.4;
    x.beginPath();x.moveTo(kx+2,ky+15.5);x.lineTo(kx+kw-2,ky+15.5);x.stroke();
    // Calligraphy
    x.globalAlpha=0.25;x.strokeStyle='#FAFAF7';x.lineWidth=0.5;
    for(var i=0;i<6;i++){x.beginPath();x.arc(kx+5+i*6,ky+15.5,1.3,0,Math.PI,true);x.stroke();}
    // Door
    x.globalAlpha=0.55;x.strokeStyle=KA_BAND;x.lineWidth=0.6;
    x.beginPath();x.moveTo(cx-4.5,ky+kh);x.lineTo(cx-4.5,ky+26);x.quadraticCurveTo(cx,ky+21,cx+4.5,ky+26);x.lineTo(cx+4.5,ky+kh);x.stroke();
    x.globalAlpha=1;x.restore();
  }

  function draw(){
    var t=THEMES[CUR_THEME];
    x.clearRect(0,0,W,H);

    // Ink splatters
    for(var i=0;i<sp.length;i++){x.beginPath();x.arc(sp[i].x,sp[i].y,sp[i].r,0,Math.PI*2);x.fillStyle=t.splat;x.globalAlpha=sp[i].o;x.fill();}
    x.globalAlpha=1;

    // Trail arcs
    x.globalAlpha=1;

    // Orbit rings
    /* orbit rings removed - drawn by background canvas */
    x.globalAlpha=1;

    // Back people
    for(var i=0;i<orbs.length;i++){
      for(var j=0;j<orbs[i].p.length;j++){
        var p=orbs[i].p[j];
        p.a-=orbs[i].sp*p.s;
        var rx=orbs[i].rx,ry=orbs[i].ry;
        var px=cx+Math.cos(p.a)*rx,py=cy+Math.sin(p.a)*ry;
        if(Math.sin(p.a)<0.1){x.beginPath();x.arc(px,py,p.z*0.65,0,Math.PI*2);x.fillStyle=t.dots;x.globalAlpha=0.18;x.fill();}
      }
    }
    x.globalAlpha=1;

    drawKaaba();

    // Front people
    for(var i=0;i<orbs.length;i++){
      for(var j=0;j<orbs[i].p.length;j++){
        var p=orbs[i].p[j];
        var rx=orbs[i].rx,ry=orbs[i].ry;
        var px=cx+Math.cos(p.a)*rx,py=cy+Math.sin(p.a)*ry;
        if(Math.sin(p.a)>=0.1){
          x.fillStyle=t.dots;x.globalAlpha=0.32+Math.sin(p.a)*0.25;
          x.beginPath();x.arc(px,py-p.z*1.1,p.z*0.45,0,Math.PI*2);x.fill();
          x.beginPath();x.ellipse(px,py+p.z*0.15,p.z*0.35,p.z*0.75,0,0,Math.PI*2);x.fill();
        }
      }
    }
    x.globalAlpha=1;

    // Glow
    var g=x.createRadialGradient(cx,cy,8,cx,cy,60);
    g.addColorStop(0,KA_BAND+'0D');g.addColorStop(1,KA_BAND+'00');
    x.fillStyle=g;x.beginPath();x.ellipse(cx,cy,60,34,0,0,Math.PI*2);x.fill();

    requestAnimationFrame(draw);
  }

  resize();draw();
  window.addEventListener('resize',resize);
})();
</script>

    s.setProperty('--tm',t.tm);s.setProperty('--ts',t.ts);s.setProperty('--tl',t.tl);

<!-- SCRIPT 5: Export (PNG/JPG/GIF) -->

<script>
(function(){
  var EB=document.getElementById('EB'),MB=document.getElementById('MB'),MCL=document.getElementById('MCL'),PRG=document.getElementById('PRG');
  var KI=document.getElementById('KI'),TC=document.getElementById('TC');
  EB.addEventListener('click',function(e){e.stopPropagation();MB.classList.add('open');});
  MCL.addEventListener('click',function(){MB.classList.remove('open');PRG.className='prg';PRG.textContent='';});
  MB.addEventListener('click',function(e){if(e.target===MB){MB.classList.remove('open');PRG.className='prg';}});

  document.getElementById('xpng').addEventListener('click',function(){doExport('png');});
  document.getElementById('xjpg').addEventListener('click',function(){doExport('jpg');});
  document.getElementById('xgif').addEventListener('click',function(){doExport('gif');});

  function doExport(fmt){
    PRG.className='prg show';
    PRG.textContent=fmt==='gif'?'Merekam frame...':'Rendering HD...';
    setTimeout(function(){
      if(fmt==='gif'){captureGif();}
      else{
        var ew=1440,eh=3120,ec=document.createElement('canvas');ec.width=ew;ec.height=eh;
        var ex=ec.getContext('2d');
        ex.fillStyle='#FAFAF7';ex.fillRect(0,0,ew,eh);
        var sc=ew/540;
        // BG particles
        var bc=document.getElementById('BC');
        ex.drawImage(bc,0,0,ew,eh);
        // Tawaf - vertically centered in top 45% of canvas
        var twW=400*sc,twH=330*sc,twX=(ew-twW)/2,twY=eh*0.07;
        ex.drawImage(TC,twX,twY,twW,twH);
        // Frame border
        ex.strokeStyle=THEMES[CUR_THEME].a1;ex.globalAlpha=0.15;ex.lineWidth=1.5;
        ex.strokeRect(32,32,ew-64,eh-64);ex.globalAlpha=1;
        // Text - spread evenly in bottom 55%
        var textTop=twY+twH+eh*0.03;
        var textBot=eh*0.92;
        var textH=textBot-textTop;
        ex.textAlign='center';
        // Selamat Hari Raya
        var y1=textTop+textH*0.05;
        ex.fillStyle=THEMES[CUR_THEME].ts;
        ex.font='400 '+Math.round(14*sc)+'px Cormorant Garamond';
        ex.fillText('S E L A M A T   H A R I   R A Y A',ew/2,y1);
        // Idul Fitri image
        var imgW=380*sc,imgH=imgW*(KI.naturalHeight/KI.naturalWidth||0.33);
        var y2=y1+textH*0.02;
        ex.drawImage(KI,(ew-imgW)/2,y2,imgW,imgH);
        // 1447 H
        var y3=y2+imgH+textH*0.04;
        ex.fillStyle=THEMES[CUR_THEME].a1;ex.font='300 '+Math.round(18*sc)+'px Cormorant Garamond';
        ex.fillText('1  4  4  7   H',ew/2,y3);
        // Botanical accent
        var y4=y3+textH*0.06;
        ex.strokeStyle=THEMES[CUR_THEME].a2;ex.globalAlpha=0.5;ex.lineWidth=sc;
        ex.beginPath();ex.moveTo(ew/2-74*sc,y4);ex.lineTo(ew/2-14*sc,y4);ex.stroke();
        ex.beginPath();ex.moveTo(ew/2+14*sc,y4);ex.lineTo(ew/2+74*sc,y4);ex.stroke();
        ex.globalAlpha=0.7;ex.fillStyle=THEMES[CUR_THEME].a2;
        ex.beginPath();ex.arc(ew/2,y4,5*sc,0,Math.PI*2);ex.fill();ex.globalAlpha=1;
        // Arabic doa
        var y5=y4+textH*0.1;
        ex.fillStyle=THEMES[CUR_THEME].tm;ex.font='400 '+Math.round(28*sc)+'px Amiri';
        ex.fillText('\u062A\u064E\u0642\u064E\u0628\u0651\u064E\u0644\u064E \u0627\u0644\u0644\u0651\u064E\u0647\u064F \u0645\u0650\u0646\u0651\u064E\u0627 \u0648\u064E\u0645\u0650\u0646\u0652\u0643\u064F\u0645\u0652',ew/2,y5);
        // Translation
        var y6=y5+textH*0.06;
        ex.fillStyle=THEMES[CUR_THEME].ts;ex.font='italic 400 '+Math.round(13*sc)+'px Cormorant Garamond';
        ex.fillText('"Semoga Allah menerima amalan',ew/2,y6);
        ex.fillText('dari kami dan darimu sekalian"',ew/2,y6+22*sc);
        // Sender
        var y7=y6+textH*0.14;
        ex.fillStyle=THEMES[CUR_THEME].tm;ex.globalAlpha=0.85;ex.font='500 '+Math.round(15*sc)+'px Cormorant Garamond';
        ex.fillText('M U H D A N   S Y A R O V Y',ew/2,y7);
        ex.globalAlpha=1;ex.fillStyle=THEMES[CUR_THEME].tl;ex.font='300 '+Math.round(12*sc)+'px Cormorant Garamond';
        ex.fillText('&  K E L U A R G A',ew/2,y7+28*sc);
        // Download
        var mime=fmt==='png'?'image/png':'image/jpeg';
        ec.toBlob(function(blob){var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download='idul-fitri-1447h.'+fmt;a.click();URL.revokeObjectURL(u);PRG.className='prg';},mime,0.95);
      }
    },100);
  }

  function captureGif(){
    var gw=1080,gh=2340,frames=36,delay=11;
    var gc=document.createElement('canvas');gc.width=gw;gc.height=gh;
    var gx=gc.getContext('2d');
    var fdata=[],f=0;
    function grab(){
      PRG.textContent='Frame '+(f+1)+'/'+frames+'...';
      gx.fillStyle='#FAFAF7';gx.fillRect(0,0,gw,gh);
      var sc=gw/540;
      gx.drawImage(document.getElementById('BC'),0,0,gw,gh);
      var twW=400*sc,twH=330*sc;
      gx.drawImage(TC,(gw-twW)/2,gh*0.07,twW,twH);
      // Text overlay
      gx.textAlign='center';var textTop=gh*0.05+twH+gh*0.03;var textBot=gh*0.92;var textH=textBot-textTop;var tY=textTop+textH*0.05;
      gx.fillStyle=THEMES[CUR_THEME].ts;gx.font='400 '+Math.round(14*sc)+'px Cormorant Garamond';
      gx.fillText('S E L A M A T   H A R I   R A Y A',gw/2,tY);
      var imgW=380*sc,imgH=imgW*(KI.naturalHeight/KI.naturalWidth||0.33);
      var y2=tY+textH*0.02;
      gx.drawImage(KI,(gw-imgW)/2,y2,imgW,imgH);
      var y3=y2+imgH+textH*0.04;
      gx.fillStyle=THEMES[CUR_THEME].a1;gx.font='300 '+Math.round(18*sc)+'px Cormorant Garamond';
      gx.fillText('1  4  4  7   H',gw/2,y3);
      var y4=y3+textH*0.06;
      gx.strokeStyle=THEMES[CUR_THEME].a2;gx.globalAlpha=0.5;gx.lineWidth=sc;
      gx.beginPath();gx.moveTo(gw/2-74*sc,y4);gx.lineTo(gw/2-14*sc,y4);gx.stroke();
      gx.beginPath();gx.moveTo(gw/2+14*sc,y4);gx.lineTo(gw/2+74*sc,y4);gx.stroke();
      gx.globalAlpha=0.7;gx.fillStyle=THEMES[CUR_THEME].a2;gx.beginPath();gx.arc(gw/2,y4,5*sc,0,Math.PI*2);gx.fill();gx.globalAlpha=1;
      var y5=y4+textH*0.1;
      gx.fillStyle=THEMES[CUR_THEME].tm;gx.font='400 '+Math.round(28*sc)+'px Amiri';
      gx.fillText('\u062A\u064E\u0642\u064E\u0628\u0651\u064E\u0644\u064E \u0627\u0644\u0644\u0651\u064E\u0647\u064F \u0645\u0650\u0646\u0651\u064E\u0627 \u0648\u064E\u0645\u0650\u0646\u0652\u0643\u064F\u0645\u0652',gw/2,y5);
      var y6=y5+textH*0.06;
      gx.fillStyle=THEMES[CUR_THEME].ts;gx.font='italic 400 '+Math.round(13*sc)+'px Cormorant Garamond';
      gx.fillText('"Semoga Allah menerima amalan',gw/2,y6);gx.fillText('dari kami dan darimu sekalian"',gw/2,y6+22*sc);
      var y7=y6+textH*0.14;
      gx.fillStyle=THEMES[CUR_THEME].tm;gx.globalAlpha=0.85;gx.font='500 '+Math.round(15*sc)+'px Cormorant Garamond';
      gx.fillText('M U H D A N   S Y A R O V Y',gw/2,y7);gx.globalAlpha=1;
      gx.fillStyle=THEMES[CUR_THEME].tl;gx.font='300 '+Math.round(12*sc)+'px Cormorant Garamond';
      gx.fillText('&  K E L U A R G A',gw/2,y7+28*sc);
      fdata.push(gx.getImageData(0,0,gw,gh));
      f++;
      if(f<frames){setTimeout(grab,120);}
      else{encGif(fdata,gw,gh,delay);}
    }
    grab();
  }

  function encGif(frames,w,h,del){
    PRG.textContent='Building palette...';
    setTimeout(function(){
      var pal=mkPal(frames);
      PRG.textContent='Quantizing...';
      setTimeout(function(){
        var idx=[];
        for(var f=0;f<frames.length;f++){idx.push(quant(frames[f],pal,w,h));if(f%6===0)PRG.textContent='Quantize '+(f+1)+'/'+frames.length;}
        PRG.textContent='Compressing...';
        setTimeout(function(){
          var buf=[];
          function w16(v){buf.push(v&0xFF,(v>>8)&0xFF);}
          buf.push(0x47,0x49,0x46,0x38,0x39,0x61);w16(w);w16(h);buf.push(0xF7,0,0);
          for(var i=0;i<256;i++)buf.push(pal[i][0],pal[i][1],pal[i][2]);
          buf.push(0x21,0xFF,0x0B,0x4E,0x45,0x54,0x53,0x43,0x41,0x50,0x45,0x32,0x2E,0x30,0x03,0x01);w16(0);buf.push(0x00);
          for(var f=0;f<idx.length;f++){
            buf.push(0x21,0xF9,0x04,0x00);w16(del);buf.push(0x00,0x00);
            buf.push(0x2C);w16(0);w16(0);w16(w);w16(h);buf.push(0x00);
            buf.push(8);var comp=lzw(idx[f],8);var pos=0;
            while(pos<comp.length){var ch=Math.min(255,comp.length-pos);buf.push(ch);for(var ci=0;ci<ch;ci++)buf.push(comp[pos++]);}
            buf.push(0x00);
          }
          buf.push(0x3B);

  function mkPal(frames){
    var c={},si=[0,Math.floor(frames.length/3),Math.floor(frames.length*2/3),frames.length-1];
    for(var fi=0;fi<si.length;fi++){var d=frames[si[fi]].data;for(var i=0;i<d.length;i+=20){var r=d[i]>>2<<2,g=d[i+1]>>2<<2,b=d[i+2]>>2<<2;var k=(r<<16)|(g<<8)|b;if(!c[k])c[k]=[r,g,b,0];c[k][3]++;}}
    var a=[];for(var k in c)a.push(c[k]);a.sort(function(x,y){return y[3]-x[3];});
    var p=[[250,250,247]];for(var i=0;i<a.length&&p.length<256;i++)p.push([a[i][0],a[i][1],a[i][2]]);
    while(p.length<256)p.push([0,0,0]);return p;
  }

  function quant(img,pal,w,h){
    var d=img.data,o=new Uint8Array(w*h),ca={};
    for(var i=0;i<w*h;i++){var ix=i*4,r=d[ix],g=d[ix+1],b=d[ix+2];var k=((r>>2)<<16)|((g>>2)<<8)|(b>>2);
    if(ca[k]!==undefined){o[i]=ca[k];continue;}var best=0,bd=999999;
    for(var j=0;j<256;j++){var dr=r-pal[j][0],dg=g-pal[j][1],db=b-pal[j][2],dd=dr*dr+dg*dg+db*db;if(dd<bd){bd=dd;best=j;if(dd===0)break;}}
    ca[k]=best;o[i]=best;}return o;
  }

  function lzw(data,mcs){
    var cc=1<<mcs,eoi=cc+1,cs=mcs+1,nc=eoi+1,mc=1<<cs;
    var dict={},out=[],bb=0,bp=0;
    function emit(code){bb|=(code<<bp);bp+=cs;while(bp>=8){out.push(bb&0xFF);bb>>=8;bp-=8;}}
    function rst(){dict={};cs=mcs+1;nc=eoi+1;mc=1<<cs;for(var i=0;i<cc;i++)dict[String(i)]=i;}
    emit(cc);rst();var cur=String(data[0]);
    for(var i=1;i<data.length;i++){var nx=String(data[i]),key=cur+','+nx;
    if(dict[key]!==undefined){cur=key;}else{emit(dict[cur]);if(nc<4096){dict[key]=nc++;if(nc>mc&&cs<12){cs++;mc=1<<cs;}}else{emit(cc);rst();}cur=nx;}}
    emit(dict[cur]);emit(eoi);if(bp>0)out.push(bb&0xFF);return out;
  }
